name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./dev.db

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          SESSION_SECRET: ci-secret-placeholder-not-real

      - name: Test
        run: npm test
        env:
          DATABASE_URL: file:./dev.db
          SESSION_SECRET: ci-secret-placeholder-not-real
